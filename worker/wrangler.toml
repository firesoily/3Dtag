name = "3dtag-auth"
main = "src/index.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Account configuration
account_id = "ead0b9c5483ff16e0a56141b8a20f293"

# 生产环境
[env.production]
# 路由配置（注意：绑定自定义域名需要 Zone 编辑权限）
# 如果自动绑定失败，请在 Cloudflare Dashboard 手动添加
routes = ["auth.3dtag.shop/*"]

# D1 数据库绑定
[[env.production.d1_databases]]
binding = "DB"
database_name = "3dtag-auth-db"
database_id = "fd17caf7-4a3f-42e6-9df9-7dfb80d485bd"

# 开发环境
[env.development]
routes = ["3dtag-auth.workers.dev/*"]

[[env.development.d1_databases]]
binding = "DB"
database_name = "3dtag-auth-db"
database_id = "fd17caf7-4a3f-42e6-9df9-7dfb80d485bd"
